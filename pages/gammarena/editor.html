<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma Arena | Content Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <style>
        .editor-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            height: calc(100vh - 100px);
        }

        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 400px;
            padding: 3rem;
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            text-align: center;
        }

        .login-card h2 { margin-bottom: 2rem; color: var(--accent-gold); }

        .input-group { margin-bottom: 1.5rem; text-align: left; }
        .input-group label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .input-group input { 
            width: 100%; 
            padding: 0.75rem; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 4px; 
            color: #fff;
            outline: none;
        }
        .input-group input:focus { border-color: var(--accent-cyan); }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(234, 179, 8, 0.4); }

        .sidebar {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
        }

        .list-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .list-item:hover { background: rgba(255,255,255,0.02); }
        .list-item.active { background: rgba(6, 182, 212, 0.1); border-left: 3px solid var(--accent-cyan); }

        .main-editor {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .editor-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .editor-panes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            flex: 1;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 1.5rem;
            color: #fff;
            font-family: 'Roboto Mono', monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: var(--accent-purple); }

        .preview-pane {
            background: #fff;
            color: #333;
            border-radius: 8px;
            padding: 2rem;
            overflow-y: auto;
            font-family: 'Inter', sans-serif;
        }

        .preview-pane h1, .preview-pane h2 { color: #000; margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
        .preview-pane p { margin-bottom: 1rem; line-height: 1.6; }

        .status-tag {
            font-size: 0.6rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
        }
        .status-draft { background: rgba(234, 179, 8, 0.1); color: var(--accent-gold); }
        .status-published { background: rgba(34, 197, 94, 0.1); color: var(--success-color); }

        .btn-icon { background: none; border: none; color: var(--text-secondary); cursor: pointer; }
        .btn-icon:hover { color: #fff; }

        .error-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--danger-color);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
            z-index: 3000;
        }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <div class="hero-logo-container" style="transform: scale(0.6);">
                <div class="hero-logo">
                    <span class="g-bg">γ</span>
                    <span class="g-fg">Γ</span>
                </div>
            </div>
            <div class="disclaimer-banner" style="background: rgba(168, 85, 247, 0.1); border: 1px solid var(--accent-purple); padding: 1rem; border-radius: 8px; margin-bottom: 2rem; font-size: 0.7rem; line-height: 1.4; color: var(--text-secondary); text-align: left;">
                <strong style="color: var(--accent-purple); display: block; margin-bottom: 0.3rem;">READ-ONLY SIMULATION</strong>
                This operator console is an observation-plane representation of the internal Gamma content-administration surface. Mutation controls are disabled in this public instance.
            </div>
            <h2>CONTENT ADMIN</h2>
            <form id="login-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" value="editor_alpha">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" value="pass_alpha_2026">
                </div>
                <button type="submit" class="btn-primary">Authenticate</button>
            </form>
        </div>
    </div>

    <nav>
        <div class="nav-brand">
            <div class="gamma-mark">
                <span class="g-bg">γ</span>
                <span class="g-fg">Γ</span>
            </div>
            <span class="nav-logo-text">GAMMA EDITOR</span>
        </div>
        <div class="nav-links">
            <span id="user-display" class="nav-link" style="color: var(--accent-gold);"></span>
            <a href="#" id="logout-btn" class="nav-link">Logout</a>
        </div>
    </nav>

    <div class="editor-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <span class="card-label">Blog Dispatch</span>
                <button class="btn-icon" id="new-btn" title="New Draft">+</button>
            </div>
            <div class="sidebar-list" id="post-list">
                <!-- Posts will be listed here -->
            </div>
        </div>

        <div class="main-editor">
            <div class="editor-controls">
                <div class="input-group" style="flex: 1; margin: 0; margin-right: 1rem;">
                    <input type="text" id="post-title" placeholder="Entry Title..." style="font-size: 1.2rem; font-weight: 800;">
                </div>
                <div style="display: flex; gap: 1rem;">
                    <button class="btn-cta" id="save-btn" disabled style="opacity: 0.5; cursor: not-allowed;">Stage Draft</button>
                    <button class="btn-cta" id="publish-btn" disabled style="opacity: 0.5; cursor: not-allowed; border-color: var(--success-color); color: var(--success-color);">Publish</button>
                </div>
            </div>

            <div class="editor-panes">
                <textarea id="editor-body" placeholder="Write in Markdown..."></textarea>
                <div class="preview-pane" id="preview">
                    <!-- Markdown preview -->
                </div>
            </div>
        </div>
    </div>

    <div id="error-toast" class="error-toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        const API_BASE = 'http://localhost:8001/api';
        let session = null;
        let activePost = null;

        // --- AUTH ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) throw new Error('Authentication Failed');

                session = await res.json();
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('user-display').innerText = session.display_name;
                
                loadPosts();
            } catch (err) {
                showError(err.message);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            session = null;
            document.getElementById('login-overlay').style.display = 'flex';
        });

        // --- CONTENT ---
        async function loadPosts() {
            try {
                const res = await fetch(`${API_BASE}/content/list?surface=blog`);
                const data = await res.json();
                const list = document.getElementById('post-list');
                list.innerHTML = '';

                data.pages.forEach(page => {
                    const pageId = page.replace('.md', '');
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.innerText = pageId;
                    item.onclick = () => selectPost(pageId);
                    list.appendChild(item);
                });
            } catch (err) {
                showError('Failed to load posts');
            }
        }

        async function selectPost(pageId) {
            try {
                const res = await fetch(`${API_BASE}/content/read?surface=blog&page_id=${pageId}`);
                const data = await res.json();
                
                activePost = pageId;
                document.getElementById('post-title').value = pageId;
                document.getElementById('editor-body').value = data.content;
                updatePreview();

                document.querySelectorAll('.list-item').forEach(el => {
                    el.classList.toggle('active', el.innerText === pageId);
                });
            } catch (err) {
                showError('Failed to read post');
            }
        }

        document.getElementById('new-btn').addEventListener('click', () => {
            activePost = null;
            document.getElementById('post-title').value = '';
            document.getElementById('editor-body').value = '';
            updatePreview();
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
        });

        document.getElementById('save-btn').addEventListener('click', async () => {
            const title = document.getElementById('post-title').value;
            const body = document.getElementById('editor-body').value;

            if (!title || !body) return showError('Title and Body required');

            try {
                const res = await fetch(`${API_BASE}/content/write`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${session.session_id}`
                    },
                    body: JSON.stringify({
                        surface: 'blog',
                        page_id: title.toLowerCase().replace(/\s+/g, '_'),
                        content: body,
                        metadata: { author: session.username, timestamp: Date.now() }
                    })
                });

                if (!res.ok) throw new Error('Save Failed');
                
                showSuccess('Draft Staged');
                loadPosts();
            } catch (err) {
                showError(err.message);
            }
        });

        document.getElementById('publish-btn').addEventListener('click', async () => {
            const title = document.getElementById('post-title').value;
            if (!title) return showError('Select a post first');

            try {
                const res = await fetch(`${API_BASE}/content/publish`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${session.session_id}`
                    },
                    body: JSON.stringify({
                        surface: 'blog',
                        page_id: title.toLowerCase().replace(/\s+/g, '_'),
                        metadata: { status: 'published', publisher: session.username }
                    })
                });

                if (!res.ok) throw new Error('Publish Failed');
                
                showSuccess('Post Published');
            } catch (err) {
                showError(err.message);
            }
        });

        // --- PREVIEW ---
        const editor = document.getElementById('editor-body');
        const preview = document.getElementById('preview');

        function updatePreview() {
            preview.innerHTML = marked.parse(editor.value);
        }

        editor.addEventListener('input', updatePreview);

        // --- UTILS ---
        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.background = 'var(--danger-color)';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        function showSuccess(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg;
            toast.style.background = 'var(--success-color)';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
