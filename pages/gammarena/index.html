<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma Arena | Observation Surface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-card: #121212;
            --accent-gold: #eab308;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --danger-color: #f43f5e;
            --border-glow: rgba(168, 85, 247, 0.2);
            --glass-bg: rgba(18, 18, 18, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            padding: 0;
            margin: 0;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        nav {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.2rem;
            letter-spacing: 0.2em;
        }

        .nav-links { display: flex; gap: 2rem; }
        .nav-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }
        .nav-link:hover { color: var(--accent-gold); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 1rem;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(255,255,255,0.03);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-badge {
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.75rem;
            font-family: 'Outfit', sans-serif;
        }

        .status-degraded { color: var(--danger-color); }
        .status-connected { color: var(--accent-cyan); }
        .status-grounded { color: #22c55e; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 2rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--border-glow);
            transform: translateY(-5px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
            opacity: 0.3;
        }

        .card-danger {
            border-color: rgba(244, 63, 94, 0.4) !important;
            background-color: rgba(244, 63, 94, 0.05) !important;
        }
        .card-danger::before { background: var(--danger-color); opacity: 0.5; }

        .card-label {
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.7rem;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
        }

        .provenance {
            font-size: 10px;
            color: var(--text-secondary);
            font-family: ui-monospace, monospace;
            margin-top: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 0.75rem;
        }
        .provenance span { color: var(--accent-cyan); font-weight: bold; }

        .footer {
            text-align: center;
            padding: 4rem 2rem;
            opacity: 0.5;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            border-top: 1px solid var(--border-glow);
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="wiki/readme.html" class="nav-logo">GAMMA ARENA</a>
        <div class="nav-links">
            <a href="wiki/readme.html" class="nav-link">Wiki Home</a>
            <a href="wiki/architecture.html" class="nav-link">Architecture</a>
            <a href="wiki/observer.html" class="nav-link">Observer</a>
            <a href="index.html" class="nav-link" style="color: var(--accent-gold);">Live Status</a>
        </div>
    </nav>
    <div class="container">
        <!-- Terminal Header -->
        <div class="header">
            <div class="title">Gamma Arena Observer</div>
            <div class="status-bar">
                <div id="connection-status" class="status-badge status-degraded">CONNECTING...</div>
                <span id="clock" style="opacity: 0.4; font-family: monospace; font-size: 0.8rem;"></span>
            </div>
        </div>

        <!-- Connectivity Detail -->
        <div id="connectivity-detail" class="card card-danger" style="display: none;">
            <div class="card-label">Link Status</div>
            <div class="card-value" style="color: var(--danger-color);">DETACHED</div>
            <div id="connectivity-msg" style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;"></div>
            <div id="connectivity-prov" class="provenance"></div>
        </div>

        <!-- Compact Status Grid -->
        <div class="grid">
            <div class="card" id="card-system">
                <div class="card-label">System State</div>
                <div class="card-value" id="val-system">INIT...</div>
                <div class="provenance" id="prov-system"></div>
            </div>
            <div class="card" id="card-agents">
                <div class="card-label">Agent Roster</div>
                <div class="card-value" id="val-agents">INIT...</div>
                <div class="provenance" id="prov-agents"></div>
            </div>
            <div class="card" id="card-persistence">
                <div class="card-label">Persistence</div>
                <div class="card-value" id="val-persistence">INIT...</div>
                <div class="provenance" id="prov-persistence"></div>
            </div>
            <div class="card" id="card-progression">
                <div class="card-label">Progression</div>
                <div class="card-value" id="val-progression">INIT...</div>
                <div class="provenance" id="prov-progression"></div>
            </div>
        </div>

        <footer class="footer">
            Gamma Arena Operator Surface :: BASTOS LAB / VANDERBILT UNIVERSITY :: 2026
        </footer>
    </div>

    <script>
        // Update Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        // --- API CONFIGURATION ---
        const API_ORIGIN = 'https://glllmx.vercel.app'; 
        const API_BASE = (API_ORIGIN ? API_ORIGIN.replace(/\/$/, '') : '') + '/api/v1';

        function updateCard(id, data, valueField) {
            const elValue = document.getElementById(`val-${id}`);
            const elProv = document.getElementById(`prov-${id}`);
            const card = document.getElementById(`card-${id}`);

            if (!data || !data.status || data.status === 'UNREACHABLE' || data.status === 'CRITICAL_FAILURE') {
                elValue.innerText = 'UNREACHABLE';
                elValue.style.color = 'var(--danger-color)';
                card.classList.add('card-danger');
                const detailStr = data?.detail ? `<span>DETAIL:</span> ${data.detail}<br>` : '';
                const sourceStr = data?.provenance?.source || 'unavailable';
                const readOnlyStr = data?.provenance?.readonly !== undefined ? data.provenance.readonly : 'unknown';
                elProv.innerHTML = `${detailStr}<span>SOURCE:</span> ${sourceStr} | <span>READONLY:</span> ${readOnlyStr}`;
            } else {
                elValue.innerText = data[valueField] || 'UNKNOWN_STATE';
                elValue.style.color = 'inherit';
                card.classList.remove('card-danger');
                const sourceStr = data.provenance?.source || 'unavailable';
                const readOnlyStr = data.provenance?.readonly !== undefined ? data.provenance.readonly : 'unknown';
                elProv.innerHTML = `<span>SOURCE:</span> ${sourceStr} | <span>READONLY:</span> ${readOnlyStr}`;
            }
        }

        async function fetchEndpoint(endpoint, id, valueField) {
            try {
                const res = await fetch(`${API_BASE}/${endpoint}`);
                if (!res.ok) throw new Error('HTTP Error');
                const data = await res.json();
                updateCard(id, data, valueField);
                return data;
            } catch (err) {
                updateCard(id, { status: 'UNREACHABLE', detail: 'Network/Protocol Error', provenance: { source: 'browser_fetch_failure' } }, '');
                return null;
            }
        }

        async function pollData() {
            try {
                const manifestRes = await fetch(`${API_BASE}/manifest`);
                if (!manifestRes.ok) throw new Error('Manifest not reachable');
                const manifest = await manifestRes.json();
                
                const statusEl = document.getElementById('connection-status');
                const connDetail = document.getElementById('connectivity-detail');
                
                if (manifest.degraded === true) {
                    statusEl.innerText = 'DEGRADED OBSERVATION';
                    statusEl.className = 'status-badge status-degraded';
                    connDetail.style.display = 'flex';
                    document.getElementById('connectivity-msg').innerText = "Live execution substrate detached. Showing committed truth only.";
                    document.getElementById('connectivity-prov').innerHTML = `<span>POLICY:</span> ${manifest.provenance_policy || 'unknown'}`;
                } else if (manifest.degraded === false) {
                    statusEl.innerText = 'GROUNDED';
                    statusEl.className = 'status-badge status-grounded';
                    connDetail.style.display = 'none';
                } else {
                    statusEl.innerText = 'REACHABLE';
                    statusEl.className = 'status-badge status-connected';
                    connDetail.style.display = 'none';
                }

                await Promise.all([
                    fetchEndpoint('status', 'system', 'status'),
                    fetchEndpoint('agents', 'agents', 'status'),
                    fetchEndpoint('persistence', 'persistence', 'status'),
                    fetchEndpoint('events/recent', 'progression', 'status')
                ]);

            } catch (err) {
                const statusEl = document.getElementById('connection-status');
                statusEl.innerText = 'UNREACHABLE';
                statusEl.className = 'status-badge status-degraded';
                
                const connDetail = document.getElementById('connectivity-detail');
                connDetail.style.display = 'flex';
                document.getElementById('connectivity-msg').innerText = "Observation service unreachable or contract mismatched.";
                document.getElementById('connectivity-prov').innerHTML = "<span>SOURCE:</span> browser_fetch_failure";
            }
        }

        pollData();
        setInterval(pollData, 10000); // Poll every 10s
    </script>
</body>
</html>
