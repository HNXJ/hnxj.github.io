    <style>
        .gallery-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(207, 184, 124, 0.2);
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
            height: 100%;
        }
        .gallery-item:hover {
            border-color: #CFB87C;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(207, 184, 124, 0.1);
        }
        .gallery-card-body {
            padding: 20px;
        }
        .gallery-category {
            color: #CFB87C;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .gallery-title {
            color: #fff;
            font-size: 1.1rem;
            font-family: 'Roboto Mono', monospace;
        }
        .iframe-preview {
            width: 100%;
            height: 300px;
            border: none;
            pointer-events: none; /* Only for preview */
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .gallery-item:hover .iframe-preview {
            opacity: 1;
        }
        #gallery-grid {
            margin-top: 50px;
        }
        .modal-content {
            background: #1a1a1a;
            border: 1px solid #CFB87C;
        }
        .modal-header {
            border-bottom: 1px solid rgba(207, 184, 124, 0.2);
        }
        .modal-title {
            color: #CFB87C;
        }
        .hero-banner {
            background-image: url('../../assets/images/purple.jpg');
            height: 300px;
            min-height: 300px;
        }
        .gallery-title {
            font-family: 'Roboto Mono', monospace;
        }
    </style>
</head>

                    <div class="col-md-7 text-center">
                        <h2 class="text-white gallery-title"> Research Asset Gallery </h2>
                        <p class="text-white-50"> High-fidelity visualizations from the GLLLM project. </p>
                    </div>
                </div>
